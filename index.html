<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume Builder</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" href="icon2.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>

<div class="app-shell">

  <!-- HEADER BAR -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-brand">
        <span class="brand-icon"><i class=""></i></span>
        <span class="brand-name">ResuméCraft</span>
      </div>
    </div>
  </header>

  <!-- SIDEBAR MENU -->
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar-menu" id="sidebarMenu">
    <div class="sidebar-header">
      <span class="sidebar-title">Menu</span>
      <button class="sidebar-close" onclick="toggleSidebar()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="sidebar-content">
      <button class="sidebar-btn" id="templateToggle" onclick="switchTemplate(); toggleSidebar();">
        <i class="fas fa-columns"></i>
        <span>Switch Template</span>
      </button>
      <button class="sidebar-btn" onclick="resetForm(); toggleSidebar();">
        <i class="fas fa-redo"></i>
        <span>Reset Form</span>
      </button>
      <button class="sidebar-btn btn-download" onclick="downloadPDF(); toggleSidebar();">
        <i class="fas fa-download"></i>
        <span>Download PDF</span>
      </button>
    </div>
  </aside>

  <div class="main-layout">

    <!-- FORM PANEL -->
    <aside class="form-panel" id="formPanel">
      <div class="form-scroll">

        <!-- Profile Image -->
        <section class="form-section">
          <h3 class="section-title"><span>01</span> Profile Photo</h3>
          <div class="image-upload-zone" id="imageUploadZone" onclick="document.getElementById('profileImageInput').click()">
            <div class="upload-placeholder" id="uploadPlaceholder">
              <div class="upload-icon">⊕</div>
              <p>Click to upload photo</p>
              <span>JPG, PNG, WebP</span>
            </div>
            <img id="imagePreviewThumb" class="thumb-preview" src="" alt="Profile" style="display:none"/>
          </div>
          <input type="file" id="profileImageInput" accept="image/*" onchange="handleImageUpload(event)" style="display:none"/>
        </section>

        <!-- Personal Info -->
        <section class="form-section">
          <h3 class="section-title"><span>02</span> Personal Information</h3>
          <div class="form-grid">
            <div class="form-group full">
              <label>Full Name</label>
              <input type="text" id="fullName" placeholder="Juan dela Cruz" oninput="updatePreview()"/>
            </div>
            <div class="form-group">
              <label>Age</label>
              <input type="number" id="age" placeholder="25" oninput="updatePreview()"/>
            </div>
            <div class="form-group">
              <label>Date of Birth</label>
              <input type="date" id="dob" oninput="updatePreview()"/>
            </div>
            <div class="form-group">
              <label>Place of Birth</label>
              <input type="text" id="pob" placeholder="Manila, Philippines" oninput="updatePreview()"/>
            </div>
            <div class="form-group">
              <label>Sex</label>
              <select id="sex" onchange="updatePreview()">
                <option value="">Select</option>
                <option>Male</option>
                <option>Female</option>
              </select>
            </div>
            <div class="form-group">
              <label>Civil Status</label>
              <select id="civilStatus" onchange="updatePreview()">
                <option value="">Select</option>
                <option>Single</option>
                <option>Married</option>

              </select>
            </div>
            <div class="form-group">
              <label>Citizenship</label>
              <input type="text" id="citizenship" placeholder="Filipino" oninput="updatePreview()"/>
            </div>
            <div class="form-group">
              <label>Height (cm)</label>
              <input type="text" id="height" placeholder="170 cm" oninput="updatePreview()"/>
            </div>
            <div class="form-group">
              <label>Weight (kg)</label>
              <input type="text" id="weight" placeholder="65 kg" oninput="updatePreview()"/>
            </div>
            <div class="form-group">
              <label>Religion</label>
              <input type="text" id="religion" placeholder="Roman Catholic" oninput="updatePreview()"/>
            </div>
            <div class="form-group full">
              <label>Language(s)</label>
              <input type="text" id="language" placeholder="Filipino, English" oninput="updatePreview()"/>
            </div>
          </div>
        </section>

        <!-- Contact -->
        <section class="form-section">
          <h3 class="section-title"><span>03</span> Contact Information</h3>
          <div class="form-grid">
            <div class="form-group full">
              <label>Address</label>
              <input type="text" id="address" placeholder="123 Rizal St., Quezon City" oninput="updatePreview()"/>
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="phone" placeholder="+63 9XX XXX XXXX" oninput="updatePreview()"/>
            </div>
            <div class="form-group">
              <label>Email</label>
              <input type="email" id="email" placeholder="juan@email.com" oninput="updatePreview()"/>
            </div>
          </div>
        </section>

        <!-- Objective -->
        <section class="form-section">
          <h3 class="section-title"><span>04</span> Career Objective</h3>
          <div class="form-group full">
            <textarea id="objective" rows="4" placeholder="A motivated professional seeking to leverage skills in..." oninput="updatePreview()"></textarea>
          </div>
        </section>

        <!-- Skills -->
        <section class="form-section">
          <h3 class="section-title"><span>05</span> Skills</h3>
          <div id="skillsList"></div>
          <button class="btn-add" onclick="addSkill()">+ Add Skill</button>
        </section>

        <!-- Education -->
        <section class="form-section">
          <h3 class="section-title"><span>06</span> Education</h3>
          <div id="educationList"></div>
          <button class="btn-add" onclick="addEducation()">+ Add Education</button>
        </section>

        <!-- Webinars -->
        <section class="form-section">
          <h3 class="section-title"><span>07</span> Webinars / Seminars</h3>
          <div id="webinarList"></div>
          <button class="btn-add" onclick="addWebinar()">+ Add Webinar</button>
        </section>

        <!-- Work Experience -->
        <section class="form-section">
          <h3 class="section-title"><span>08</span> Work Experience</h3>
          <div id="workList"></div>
          <button class="btn-add" onclick="addWork()">+ Add Experience</button>
        </section>

      </div>
    </aside>

    <!-- PREVIEW PANEL -->
    <main class="preview-panel">
      <div class="preview-label">Live Preview</div>
      <div class="preview-wrapper">
        <div id="resumePreview" class="resume template-classic">
          <!-- Rendered by JS -->
        </div>
      </div>
    </main>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes"/>
  <title>ResuméCraft — Professional Resume Builder</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link rel="icon" type="png" href="icon2.png" />
</head>
<body>

<div class="app-shell">

  <div id="toastContainer" class="toast-container"></div>

  <header class="topbar">
    <div class="topbar-left">
      <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
      </button>
      <div class="topbar-brand">
        <span class="brand-name">ResuméCraft</span>
      </div>
    </div>
    <div class="topbar-right">
  <a href="feedback.html" class="topbar-btn feedback-btn">
    <i class="fas fa-comment-dots"></i>
    <span>Feedback</span>
  </a>
</div>
  </header> 


  <div class="mobile-tabs" id="mobileTabs">
    <button class="mobile-tab active" id="tabEditor" onclick="switchMobileTab('editor')">
      <i class="fas fa-pen-to-square"></i> Editor
    </button>
    <button class="mobile-tab" id="tabPreview" onclick="switchMobileTab('preview')">
      <i class="fas fa-eye"></i> Preview
    </button>
  </div>

  <div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
  <aside class="sidebar-menu" id="sidebarMenu">
    <div class="sidebar-header">
      <span class="sidebar-title">Menu</span>
      <button class="sidebar-close" onclick="toggleSidebar()">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div class="sidebar-content">
      <button class="sidebar-btn" id="templateToggle" onclick="switchTemplate(); toggleSidebar();">
        <i class="fas fa-columns"></i>
        <span>Switch Template</span>
      </button>
      <button class="sidebar-btn" onclick="resetForm(); toggleSidebar();">
        <i class="fas fa-redo"></i>
        <span>Reset Form</span>
      </button>
      <div class="sidebar-divider"></div>
      <button class="sidebar-btn btn-download" onclick="downloadPDF(); toggleSidebar();">
        <i class="fas fa-file-pdf"></i>
        <span>Download PDF</span>
      </button>
      <button class="sidebar-btn btn-download-doc" onclick="downloadDOC(); toggleSidebar();">
        <i class="fas fa-file-word"></i>
        <span>Download Editable DOC</span>
      </button>
    </div>
    <div class="sidebar-footer">
      <span class="autosave-indicator" id="autosaveIndicator">
        <i class="fas fa-circle-check"></i> Auto-saved
      </span>
    </div>
  </aside>

  <div class="main-layout">

    <aside class="form-panel" id="formPanel">
      <div class="form-scroll">
      
        <section class="form-section">
          <h3 class="section-title"><span>01</span> Profile Photo</h3>
          <div class="image-upload-zone" id="imageUploadZone"
               onclick="document.getElementById('profileImageInput').click()"
               ondragover="handleDragOver(event)"
               ondrop="handleDrop(event)">
            <div class="upload-placeholder" id="uploadPlaceholder">
              <div class="upload-icon"><i class="fas fa-cloud-arrow-up"></i></div>
              <p>Click or drag photo here</p>
              <span>JPG, PNG, WebP</span>
            </div>
            <img id="imagePreviewThumb" class="thumb-preview" src="" alt="Profile" style="display:none"/>
            <button class="remove-image-btn" id="removeImageBtn" style="display:none" onclick="removeImage(event)">
              <i class="fas fa-times"></i>
            </button>
          </div>
          <input type="file" id="profileImageInput" accept="image/*" onchange="handleImageUpload(event)" style="display:none"/>
        </section>

  
        <section class="form-section">
          <h3 class="section-title"><span>02</span> Personal Information</h3>
          <div class="form-grid">
            <div class="form-group full">
              <label>Full Name</label>
              <input type="text" id="fullName" placeholder="Juan dela Cruz" oninput="updatePreview(); autoSave()"/>
            </div>
            <div class="form-group"><label>Age</label><input type="number" id="age" placeholder="25" oninput="updatePreview(); autoSave()"/></div>
            <div class="form-group"><label>Date of Birth</label><input type="date" id="dob" oninput="updatePreview(); autoSave()"/></div>
            <div class="form-group"><label>Place of Birth</label><input type="text" id="pob" placeholder="Manila, Philippines" oninput="updatePreview(); autoSave()"/></div>
            <div class="form-group"><label>Sex</label><select id="sex" onchange="updatePreview(); autoSave()"><option value="">Select</option><option>Male</option><option>Female</option></select></div>
            <div class="form-group"><label>Civil Status</label><select id="civilStatus" onchange="updatePreview(); autoSave()"><option value="">Select</option><option>Single</option><option>Married</option></select></div>
            <div class="form-group"><label>Citizenship</label><input type="text" id="citizenship" placeholder="Filipino" oninput="updatePreview(); autoSave()"/></div>
            <div class="form-group"><label>Height (cm)</label><input type="text" id="height" placeholder="170 cm" oninput="updatePreview(); autoSave()"/></div>
            <div class="form-group"><label>Weight (kg)</label><input type="text" id="weight" placeholder="65 kg" oninput="updatePreview(); autoSave()"/></div>
            <div class="form-group"><label>Religion</label><input type="text" id="religion" placeholder="Roman Catholic" oninput="updatePreview(); autoSave()"/></div>
            <div class="form-group full"><label>Language(s)</label><input type="text" id="language" placeholder="Filipino, English" oninput="updatePreview(); autoSave()"/></div>
          </div>
        </section>

  
        <section class="form-section">
          <h3 class="section-title"><span>03</span> Contact Information</h3>
          <div class="form-grid">
            <div class="form-group full"><label>Address</label><input type="text" id="address" placeholder="123 Rizal St., Quezon City" oninput="updatePreview(); autoSave()"/></div>
            <div class="form-group"><label>Phone Number</label><input type="tel" id="phone" placeholder="+63 9XX XXX XXXX" oninput="updatePreview(); autoSave()"/></div>
            <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="juan@email.com" oninput="updatePreview(); autoSave()"/></div>
          </div>
        </section>

      
        <section class="form-section"><h3 class="section-title"><span>04</span> Career Objective</h3><div class="form-group full"><textarea id="objective" rows="4" placeholder="A motivated professional seeking to leverage skills in..." oninput="updatePreview(); autoSave()"></textarea></div></section>

     <section class="form-section"><h3 class="section-title"><span>05</span> Skills</h3><div id="skillsList"></div><button class="btn-add" onclick="addSkill()"><i class="fas fa-plus"></i> Add Skill</button></section>
    <section class="form-section"><h3 class="section-title"><span>06</span> Education</h3><div id="educationList"></div><button class="btn-add" onclick="addEducation()"><i class="fas fa-plus"></i> Add Education</button></section>
   <section class="form-section"><h3 class="section-title"><span>07</span> Webinars / Seminars</h3><div id="webinarList"></div><button class="btn-add" onclick="addWebinar()"><i class="fas fa-plus"></i> Add Webinar</button></section>
  <section class="form-section"><h3 class="section-title"><span>08</span> Work Experience</h3><div id="workList"></div><button class="btn-add" onclick="addWork()"><i class="fas fa-plus"></i> Add Experience</button></section>
      </div>
    </aside>

  
    <main class="preview-panel" id="previewPanel">
      <div class="preview-toolbar">
        <span class="preview-label"><i class="fas fa-eye"></i> Live Preview</span>
        <div class="preview-actions">
          <button class="preview-action-btn" onclick="downloadPDF()" title="Download PDF"><i class="fas fa-file-pdf"></i></button>
          <button class="preview-action-btn" onclick="downloadDOC()" title="Download DOC"><i class="fas fa-file-word"></i></button>
        </div>
      </div>
      <div class="preview-wrapper">
        <div id="resumePreview" class="resume template-classic"></div>
      </div>
    </main>

  </div>
</div>


<script src="script.js"></script>
</body>
</html>
